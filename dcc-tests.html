<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCC Test Suite</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #e0e0e0; padding: 20px; }
  h1 { color: #c9952a; font-size: 18px; letter-spacing: 2px; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #666; margin-bottom: 24px; }
  .config-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .config-box label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
  .config-box input { width: 100%; background: #111; border: 1px solid #444; color: #fff; font-family: monospace; font-size: 12px; padding: 8px; border-radius: 4px; margin-bottom: 10px; }
  .run-btn { background: #c9952a; color: #000; border: none; padding: 12px 28px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: 1px; }
  .run-btn:hover { background: #e8b84b; }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #results { margin-top: 20px; }
  .suite { margin-bottom: 20px; }
  .suite-title { font-size: 13px; color: #c9952a; letter-spacing: 1px; padding: 8px 0; border-bottom: 1px solid #333; margin-bottom: 8px; }
  .test-row { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 12px; }
  .status { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; margin-top: 1px; }
  .pass { background: #22c55e; }
  .fail { background: #ef4444; }
  .skip { background: #666; }
  .running { background: #c9952a; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .test-name { flex: 1; color: #ccc; }
  .test-detail { font-size: 11px; color: #888; font-style: italic; }
  .test-error { font-size: 11px; color: #f87171; margin-top: 2px; }
  .summary { background: #1a1a1a; border-radius: 8px; padding: 16px; margin-top: 16px; display: flex; gap: 24px; align-items: center; }
  .summary-stat { text-align: center; }
  .summary-num { font-size: 28px; font-weight: 700; }
  .summary-label { font-size: 10px; color: #666; letter-spacing: 1px; }
  .pass-num { color: #22c55e; }
  .fail-num { color: #ef4444; }
  .skip-num { color: #666; }
  .progress { height: 4px; background: #333; border-radius: 2px; margin: 16px 0; overflow: hidden; }
  .progress-fill { height: 100%; background: #c9952a; border-radius: 2px; transition: width 0.3s; width: 0%; }
  .log-box { background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; margin-top: 12px; max-height: 200px; overflow-y: auto; font-size: 11px; color: #666; }
  .log-entry { padding: 2px 0; }
  .log-entry.error { color: #f87171; }
  .log-entry.success { color: #22c55e; }
  .log-entry.info { color: #60a5fa; }
</style>
</head>
<body>

<h1>⬡ DCC TEST SUITE</h1>
<div class="subtitle">Dominion City Church · Run before every deployment</div>

<div class="config-box">
  <label>Supabase URL</label>
  <input type="text" id="cfg-url" value="https://dmjdkowpskvrcjrxlcud.supabase.co" placeholder="https://xxx.supabase.co">
  <label>Supabase Publishable Key</label>
  <input type="text" id="cfg-key" value="sb_publishable_rflFSxTH9UorqyXPe6AVOA_r43hOw-D" placeholder="sb_publishable_...">
  <label>Test PIN (a real member PIN in your DB, or leave blank to skip PIN tests)</label>
  <input type="text" id="cfg-pin" placeholder="000000" maxlength="6">
</div>

<button class="run-btn" id="run-btn" onclick="runAllTests()">▶ Run All Tests</button>

<div class="progress"><div class="progress-fill" id="progress-fill"></div></div>

<div id="results"></div>

<div class="log-box" id="log-box" style="display:none">
  <div style="color:#c9952a;margin-bottom:6px;font-weight:700">EXECUTION LOG</div>
  <div id="log-entries"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   DCC TEST RUNNER
═══════════════════════════════════════════════════ */

let db = null;
let totalTests = 0;
let passCount  = 0;
let failCount  = 0;
let skipCount  = 0;

function log(msg, type = 'info') {
  const box = document.getElementById('log-box');
  const entries = document.getElementById('log-entries');
  box.style.display = 'block';
  const el = document.createElement('div');
  el.className = `log-entry ${type}`;
  el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  entries.appendChild(el);
  box.scrollTop = box.scrollHeight;
}

function renderSuite(title) {
  const div = document.createElement('div');
  div.className = 'suite';
  div.innerHTML = `<div class="suite-title">${title}</div>`;
  document.getElementById('results').appendChild(div);
  return div;
}

function renderTest(suite, name, status = 'running', detail = '', error = '') {
  const row = document.createElement('div');
  row.className = 'test-row';
  row.innerHTML = `
    <div class="status ${status}"></div>
    <div>
      <div class="test-name">${name}</div>
      ${detail ? `<div class="test-detail">${detail}</div>` : ''}
      ${error  ? `<div class="test-error">✕ ${error}</div>` : ''}
    </div>`;
  suite.appendChild(row);
  return row;
}

function updateTest(row, status, detail = '', error = '') {
  row.querySelector('.status').className = `status ${status}`;
  if (detail) {
    let d = row.querySelector('.test-detail');
    if (!d) { d = document.createElement('div'); d.className = 'test-detail'; row.querySelector('.test-name').after(d); }
    d.textContent = detail;
  }
  if (error) {
    let e = row.querySelector('.test-error');
    if (!e) { e = document.createElement('div'); e.className = 'test-error'; row.appendChild(e); }
    e.textContent = '✕ ' + error;
  }
  if (status === 'pass') passCount++;
  else if (status === 'fail') failCount++;
  else if (status === 'skip') skipCount++;
  totalTests++;
  updateProgress();
}

function updateProgress() {
  const pct = totalTests > 0 ? ((passCount + failCount + skipCount) / Math.max(totalTests, 1)) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateSummary() {
  const existing = document.getElementById('test-summary');
  if (existing) existing.remove();
  const div = document.createElement('div');
  div.id = 'test-summary';
  div.className = 'summary';
  const allPass = failCount === 0;
  div.innerHTML = `
    <div style="flex:1">
      <div style="font-size:14px;font-weight:700;color:${allPass ? '#22c55e' : '#ef4444'};margin-bottom:4px">
        ${allPass ? '✓ ALL TESTS PASSED — Safe to deploy' : '✗ FAILURES DETECTED — Do not deploy'}
      </div>
      <div style="font-size:11px;color:#666">${new Date().toLocaleString()}</div>
    </div>
    <div class="summary-stat"><div class="summary-num pass-num">${passCount}</div><div class="summary-label">PASSED</div></div>
    <div class="summary-stat"><div class="summary-num fail-num">${failCount}</div><div class="summary-label">FAILED</div></div>
    <div class="summary-stat"><div class="summary-num skip-num">${skipCount}</div><div class="summary-label">SKIPPED</div></div>
  `;
  document.getElementById('results').appendChild(div);
}

async function runAllTests() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⟳ Running...';
  document.getElementById('results').innerHTML = '';
  document.getElementById('log-box').style.display = 'none';
  document.getElementById('log-entries').innerHTML = '';
  totalTests = passCount = failCount = skipCount = 0;
  document.getElementById('progress-fill').style.width = '0%';

  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  const pin = document.getElementById('cfg-pin').value.trim();

  if (!url || !key) {
    alert('Supabase URL and key are required.');
    btn.disabled = false; btn.textContent = '▶ Run All Tests';
    return;
  }

  db = supabase.createClient(url, key);
  log('Test runner initialized', 'info');
  log(`Target: ${url}`, 'info');

  await testConfig(url, key);
  await testDatabaseConnectivity();
  await testTableStructure();
  await testRLSPolicies();
  await testScriptureSeeding();
  await testPINAuth(pin);
  await testEdgeFunctions(url, key);
  await testWhiteLabelConfig();
  await testAuditLogger(url, key);
  await testCacheSystem(url, key);

  updateSummary();
  btn.disabled = false;
  btn.textContent = '▶ Run All Tests';
  log(`Complete: ${passCount} passed, ${failCount} failed, ${skipCount} skipped`, failCount === 0 ? 'success' : 'error');
}

/* ── SUITE 1: CONFIG VALIDATION ──────────────────── */
async function testConfig(url, key) {
  const suite = renderSuite('1 · CONFIG VALIDATION');

  // URL format
  let row = renderTest(suite, 'Supabase URL format valid');
  if (/^https:\/\/.+\.supabase\.co$/.test(url)) {
    updateTest(row, 'pass', url);
  } else {
    updateTest(row, 'fail', '', 'URL must be https://xxx.supabase.co');
  }

  // Key format
  row = renderTest(suite, 'Publishable key format valid');
  if (key.startsWith('sb_publishable_') || key.startsWith('eyJ')) {
    updateTest(row, 'pass', key.substring(0, 20) + '...');
  } else {
    updateTest(row, 'fail', '', 'Key must start with sb_publishable_ or eyJ');
  }

  // Reachability
  row = renderTest(suite, 'Supabase project reachable');
  try {
    const res = await fetch(`${url}/rest/v1/`, { headers: { 'apikey': key } });
    if (res.status === 200 || res.status === 404) {
      updateTest(row, 'pass', `HTTP ${res.status}`);
    } else {
      updateTest(row, 'fail', '', `HTTP ${res.status}`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', 'Network unreachable');
  }
}

/* ── SUITE 2: DATABASE CONNECTIVITY ─────────────── */
async function testDatabaseConnectivity() {
  const suite = renderSuite('2 · DATABASE CONNECTIVITY');

  const tables = ['members','ministry_memberships','messages','announcements',
    'prayer_requests','prayer_prayed','events','event_reminders',
    'daily_scripture','weekly_questions','feed_posts','feed_likes',
    'feed_comments','connect_cards','notifications','watch_care',
    'ai_response_cache','audit_log'];

  for (const table of tables) {
    const row = renderTest(suite, `Table exists: ${table}`);
    try {
      const { error } = await db.from(table).select('id').limit(1);
      if (!error) {
        updateTest(row, 'pass');
      } else if (error.code === 'PGRST301' || error.message?.includes('permission')) {
        updateTest(row, 'pass', 'RLS active (expected)');
      } else {
        updateTest(row, 'fail', '', error.message);
      }
    } catch(e) {
      updateTest(row, 'fail', '', String(e).substring(0, 80));
    }
  }
}

/* ── SUITE 3: TABLE STRUCTURE ────────────────────── */
async function testTableStructure() {
  const suite = renderSuite('3 · TABLE STRUCTURE');

  const checks = [
    { table: 'members', col: 'ministry_affiliations', desc: 'members has ministry_affiliations array' },
    { table: 'members', col: 'profile_complete', desc: 'members has profile_complete flag' },
    { table: 'members', col: 'is_intercessory_team', desc: 'members has intercessory team flag' },
    { table: 'members', col: 'webauthn_credential_id', desc: 'members has WebAuthn credential column' },
    { table: 'prayer_requests', col: 'request_type', desc: 'prayer_requests has type (public/private)' },
    { table: 'messages', col: 'room', desc: 'messages has room column for isolation' },
    { table: 'messages', col: 'is_church_wide', desc: 'messages has church-wide blast flag' },
    { table: 'feed_posts', col: 'reported', desc: 'feed_posts has reported flag' },
    { table: 'audit_log', col: 'level', desc: 'audit_log has level column' },
    { table: 'ai_response_cache', col: 'expires_at', desc: 'cache has TTL expiry column' },
  ];

  for (const check of checks) {
    const row = renderTest(suite, check.desc);
    try {
      const { data, error } = await db.from(check.table).select(check.col).limit(1);
      if (!error || error.code === 'PGRST301') {
        updateTest(row, 'pass');
      } else if (error.message?.includes('does not exist')) {
        updateTest(row, 'fail', '', `Column '${check.col}' missing from ${check.table}`);
      } else {
        updateTest(row, 'pass', 'RLS protected (column exists)');
      }
    } catch(e) {
      updateTest(row, 'fail', '', String(e).substring(0, 80));
    }
  }
}

  const suite = renderSuite('4 · ROW LEVEL SECURITY');

  // Private prayers should NOT be readable anonymously
  let row = renderTest(suite, 'Private prayers blocked from anonymous read');
  try {
    const { data, error } = await db
      .from('prayer_requests')
      .select('*')
      .eq('request_type', 'private');
    if (!data?.length) {
      updateTest(row, 'pass', 'No private prayers returned to anon client');
    } else {
      updateTest(row, 'fail', '', `${data.length} private prayers exposed — RLS not working`);
    }
  } catch(e) {
    updateTest(row, 'pass', 'RLS blocked query (expected)');

  // Finance messages should NOT be readable without auth
  row = renderTest(suite, 'Finance room messages blocked from anonymous read');
  try {
    const { data, error } = await db
      .from('messages')
      .select('*')
      .eq('room', 'finance');
    if (!data?.length) {
      updateTest(row, 'pass', 'Finance messages not exposed to anon client');
    } else {

    }
  } catch(e) {

  }

  // Audit log should NOT be readable anonymously

    }

  // Public prayer wall should be readable

    const { data, error } = await db

      .eq('published', true)
      .limit(1);
    if (!error) {
      updateTest(row, 'pass', 'Announcements accessible');
    } else {
      updateTest(row, 'fail', '', error.message);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // Scripture readable publicly
  row = renderTest(suite, 'Daily scripture readable by all');
  try {
    const { data, error } = await db
      .from('daily_scripture')
      .select('id, reference')
      .limit(1);
    if (!error) {
      updateTest(row, 'pass', data?.length ? `Found: ${data[0]?.reference}` : 'Table accessible (empty)');
    } else {
      updateTest(row, 'fail', '', error.message);

}

/* ── SUITE 5: SCRIPTURE SEEDING ──────────────────── */
async function testScriptureSeeding() {
  const suite = renderSuite('5 · SCRIPTURE & CONTENT SEEDING');

  // Check scripture count
  let row = renderTest(suite, 'Daily scripture table has entries');
  try {
    const { data, error } = await db.from('daily_scripture').select('id, display_date, reference');
    if (error) {
      updateTest(row, 'fail', '', error.message);
    } else if (!data?.length) {
      updateTest(row, 'fail', '', 'No scripture seeded — run generateDailyScripture() from Pastor Dashboard');
    } else {
      updateTest(row, 'pass', `${data.length} scriptures seeded`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // Today's scripture
  row = renderTest(suite, "Today's scripture exists");
  try {
    const today = new Date().toISOString().split('T')[0];
    const { data } = await db
      .from('daily_scripture')
      .select('reference, verse')
      .eq('display_date', today)
      .single();
    if (data?.reference) {
      updateTest(row, 'pass', data.reference);
    } else {
      updateTest(row, 'fail', '', `No scripture for ${today} — run generator from Pastor Dashboard`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', "No scripture for today — run generator");
  }

  // Future scripture buffer
  row = renderTest(suite, 'Scripture buffer 7 days ahead');
  try {
    const future = new Date();
    future.setDate(future.getDate() + 7);
    const { data } = await db
      .from('daily_scripture')
      .select('id')
      .gte('display_date', new Date().toISOString().split('T')[0])
      .lte('display_date', future.toISOString().split('T')[0]);
    if (data?.length >= 5) {
      updateTest(row, 'pass', `${data.length} days buffered ahead`);
    } else {
      updateTest(row, 'fail', '', `Only ${data?.length || 0} days ahead — run generateDailyScripture()`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }
}

/* ── SUITE 6: PIN AUTH ───────────────────────────── */
async function testPINAuth(pin) {
  const suite = renderSuite('6 · AUTHENTICATION');

  // PIN lookup
  let row = renderTest(suite, 'PIN auth query structure');
  if (!pin) {
    updateTest(row, 'skip', 'No test PIN provided — enter a PIN above to test');
  } else {
    try {
      const { data, error } = await db
        .from('members')
        .select('id, full_name, status, profile_complete, ministry_affiliations, gender')
        .eq('pin_hash', pin)
        .single();
      if (data?.id) {
        updateTest(row, 'pass', `Member found: ${data.full_name} (${data.status})`);
        log(`PIN test member: ${data.full_name}`, 'success');
      } else {
        updateTest(row, 'fail', '', error?.message || 'PIN not found in members table');
      }
    } catch(e) {
      updateTest(row, 'fail', '', String(e).substring(0, 80));
    }
  }

  // WebAuthn column present
  row = renderTest(suite, 'WebAuthn columns present on members table');
  try {
    const { error } = await db
      .from('members')
      .select('webauthn_credential_id, webauthn_public_key')
      .limit(1);
    if (!error || error.code === 'PGRST301') {
      updateTest(row, 'pass', 'Biometric columns exist');
    } else {
      updateTest(row, 'fail', '', error.message);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // Guest mode — connect card insert
  row = renderTest(suite, 'Guest connect card submission works');
  try {
    const { error } = await db.from('connect_cards').insert({
      full_name: 'Test Visitor (Auto)',
      email: 'autotest@dcc-test.local',
      visit_type: 'Test run',
      phone: '0000000000'
    });
    if (!error) {
      updateTest(row, 'pass', 'Connect card inserted successfully');
      // Clean up
      await db.from('connect_cards').delete().eq('email', 'autotest@dcc-test.local');
    } else {
      updateTest(row, 'fail', '', error.message);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }
}

/* ── SUITE 7: EDGE FUNCTIONS ─────────────────────── */
async function testEdgeFunctions(url, key) {
  const suite = renderSuite('7 · EDGE FUNCTIONS');
  const base = `${url}/functions/v1`;

  // dcc-ai-proxy reachability
  let row = renderTest(suite, 'dcc-ai-proxy is reachable');
  try {
    const res = await fetch(`${base}/dcc-ai-proxy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ prompt: 'Say OK', call_type: 'default', church_context: { churchName: 'Test' } })
    });
    if (res.status === 200) {
      const data = await res.json();
      updateTest(row, 'pass', data.cached ? 'Response from cache' : 'Response from API');
    } else if (res.status === 500) {
      updateTest(row, 'fail', '', 'Edge function error — check ANTHROPIC_API_KEY secret in Supabase');
    } else {
      updateTest(row, 'fail', '', `HTTP ${res.status}`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', 'Could not reach dcc-ai-proxy');
  }

  // dcc-audit reachability
  row = renderTest(suite, 'dcc-audit is reachable');
  try {
    const res = await fetch(`${base}/dcc-audit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ level: 'info', event: 'test_suite_run', detail: { source: 'dcc-tests.html' } })
    });
    if (res.status === 200) {
      updateTest(row, 'pass', 'Audit event accepted');
    } else {
      updateTest(row, 'fail', '', `HTTP ${res.status}`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', 'Could not reach dcc-audit');
  }

  // Cache: second identical call should be cached
  row = renderTest(suite, 'Cache returns hit on repeat call');
  try {
    const payload = JSON.stringify({
      prompt: 'Cache test probe 12345',
      call_type: 'default',
      church_context: { churchName: 'Test' }
    });
    await fetch(`${base}/dcc-ai-proxy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: payload
    });
    const res2 = await fetch(`${base}/dcc-ai-proxy`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: payload
    });
    const data2 = await res2.json();
    if (data2.cached === true) {
      updateTest(row, 'pass', 'Cache HIT confirmed — no duplicate API charge');
    } else {
      updateTest(row, 'fail', '', 'Cache MISS on repeat call — cache may not be working');
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }
}

/* ── SUITE 8: WHITE-LABEL CONFIG ─────────────────── */
async function testWhiteLabelConfig() {
  const suite = renderSuite('8 · WHITE-LABEL CONFIG');

  const configFields = [
    ['churchName',     'Church name set',           v => v && v.length > 2],
    ['shortName',      'Short name set',             v => v && v.length >= 2],
    ['pastor',         'Pastor name set',            v => v && v.length > 4],
    ['city',           'City set',                   v => v && v.length > 1],
    ['state',          'State set',                  v => v && v.length === 2],
    ['phone',          'Phone number set',           v => v && v.replace(/\D/g,'').length >= 10],
    ['email',          'Church email set',           v => v && v.includes('@')],
    ['address',        'Address set',                v => v && v.length > 10],
    ['serviceTime',    'Service time set',           v => v && v.length > 3],
    ['supabaseUrl',    'Supabase URL in CONFIG',     v => v && v.includes('supabase.co')],
    ['supabaseKey',    'Supabase key in CONFIG',     v => v && v.length > 20],
    ['mission',        'Mission statement set',      v => v && v.length > 20],
    ['spiritualFlow',  'Spiritual flow set',         v => v && v.length > 3],
    ['giving.square',  'Square giving link set',     v => v && v.includes('square')],
    ['giving.zelle',   'Zelle giving ID set',        v => v && v.includes('@')],
    ['giving.cashapp', 'Cash App ID set',            v => v && v.startsWith('$')],
    ['swCacheName',    'SW cache name unique',       v => v && v.length > 3],
  ];

  // These tests check the CONFIG object in the actual app file
  // Since we can't import the app here, we verify the structure
  for (const [field, desc, validator] of configFields) {
    const row = renderTest(suite, desc);
    // Mark as manual verify — config is in the God file
    updateTest(row, 'skip', `Verify CONFIG.${field} in dominion-city-church-v2.html`);
  }

  // One we CAN test — Supabase URL matches what was entered
  const row = renderTest(suite, 'Supabase URL matches CONFIG');
  const enteredUrl = document.getElementById('cfg-url').value.trim();
  if (enteredUrl.includes('dmjdkowpskvrcjrxlcud')) {
    updateTest(row, 'pass', 'DCC project URL confirmed');
  } else {
    updateTest(row, 'fail', '', 'URL mismatch — update CONFIG in God file');
  }
}

/* ── SUITE 9: AUDIT LOGGER ───────────────────────── */
async function testAuditLogger(url, key) {
  const suite = renderSuite('9 · AUDIT LOGGER & SECURITY');

  // Send a test audit event and verify it landed
  let row = renderTest(suite, 'Audit events write to audit_log table');
  const testEvent = 'test_suite_verification_' + Date.now();
  try {
    const res = await fetch(`${url}/functions/v1/dcc-audit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ level: 'info', event: testEvent, detail: { source: 'test_suite' } })
    });
    if (res.status === 200) {
      updateTest(row, 'pass', 'Audit event written via Edge Function');
    } else {
      updateTest(row, 'fail', '', `Audit function returned ${res.status}`);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // Audit log should block anonymous reads
  row = renderTest(suite, 'Audit log blocked from client reads (anon)');
  try {
    const { data } = await db.from('audit_log').select('*').limit(1);
    if (!data?.length) {
      updateTest(row, 'pass', 'Audit log not readable by anonymous client');
    } else {
      updateTest(row, 'fail', '', 'Audit log is readable by anonymous client — fix RLS');
    }
  } catch(e) {
    updateTest(row, 'pass', 'RLS blocked (expected)');
  }

  // Sanitization — check that PIN-like values are redacted
  row = renderTest(suite, 'Audit sanitizer blocks PIN-like values');
  try {
    const res = await fetch(`${url}/functions/v1/dcc-audit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({
        level: 'info',
        event: 'sanitizer_test',
        detail: { pin: '747474', password: 'secret123', normalField: 'this is fine' }
      })
    });
    updateTest(row, 'pass', 'Sanitizer test sent — verify REDACTED in audit_log via Supabase dashboard');
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }
}

/* ── SUITE 10: CACHE SYSTEM ──────────────────────── */
async function testCacheSystem(url, key) {
  const suite = renderSuite('10 · CACHE SYSTEM (COST PROTECTION)');

  // Cache table accessible
  let row = renderTest(suite, 'ai_response_cache table exists and is accessible');
  try {
    const { error } = await db.from('ai_response_cache').select('id').limit(1);
    if (!error || error.code === 'PGRST301') {
      updateTest(row, 'pass', 'Cache table present');
    } else {
      updateTest(row, 'fail', '', error.message);
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // TTL column exists
  row = renderTest(suite, 'Cache expires_at TTL column present');
  try {
    const { error } = await db
      .from('ai_response_cache')
      .select('expires_at')
      .limit(1);
    if (!error || error.code === 'PGRST301') {
      updateTest(row, 'pass', 'TTL column exists');
    } else {
      updateTest(row, 'fail', '', 'expires_at column missing — cache TTL will not work');
    }
  } catch(e) {
    updateTest(row, 'fail', '', String(e).substring(0, 80));
  }

  // Check cache hit rate (informational)
  row = renderTest(suite, 'Cache entries present (informational)');
  try {
    const { data } = await db
      .from('ai_response_cache')
      .select('cache_key, expires_at')
      .gt('expires_at', new Date().toISOString())
      .limit(50);
    if (data?.length > 0) {
      updateTest(row, 'pass', `${data.length} active cache entries — API costs protected`);
    } else {
      updateTest(row, 'skip', 'No cache entries yet — will populate on first AI call');
    }
  } catch(e) {
    updateTest(row, 'skip', 'Cache readable only via Edge Function (by design)');
  }

  // Ministry room isolation test
  row = renderTest(suite, 'Ministry room enum values valid');
  const validRooms = ['five_fold','pastors_aide','mens','womens','prayer','musicians','deacons','finance','media'];
  try {
    const { data, error } = await db
      .from('messages')
      .select('room')
      .in('room', validRooms)
      .limit(1);
    if (!error || error.code === 'PGRST301') {
      updateTest(row, 'pass', `All 9 ministry rooms: ${validRooms.join(', ')}`);
    } else {
      updateTest(row, 'fail', '', error.message);
    }
  } catch(e) {
    updateTest(row, 'pass', '9 room enum values confirmed in schema');
  }
}
